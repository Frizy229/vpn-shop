<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZAVARKA VPN Admin</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background: #121212; 
            color: white; 
            padding: 15px; 
            margin: 0; 
            overflow-x: hidden;
        }

        /* Контейнер для вкладок */
        .tabs { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 20px; 
            position: relative; 
            z-index: 100;
        }
        
        .tab-btn { 
            flex: 1; 
            padding: 12px; 
            border-radius: 10px; 
            border: none; 
            background: #252525; 
            color: #777; 
            font-weight: bold; 
            cursor: pointer;
            pointer-events: auto; /* Явно разрешаем клики */
        }
        
        .tab-btn.active.trial { background: #27ae60 !important; color: white !important; }
        .tab-btn.active.pay { background: #2980b9 !important; color: white !important; }

        /* Списки ключей */
        .key-list { display: none; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .key-list.active { display: flex; }

        .key-item { 
            background: #1e1e1e; 
            padding: 12px; 
            border-radius: 10px; 
            border: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Форма добавления */
        .add-box { 
            background: #1a1a1a; 
            padding: 20px; 
            border-radius: 15px; 
            border: 1px solid #333; 
            margin-top: 10px;
            position: relative;
            z-index: 200; /* Самый высокий приоритет */
            pointer-events: auto;
        }

        h3 { margin-top: 0; color: #fff; }

        input { 
            width: 100%; 
            padding: 14px; 
            margin: 8px 0 15px; 
            border-radius: 10px; 
            border: 1px solid #333; 
            background: #252525; 
            color: white; 
            box-sizing: border-box; 
            font-size: 16px;
            pointer-events: auto;
        }

        .btn-add { 
            width: 100%; 
            padding: 16px; 
            border: none; 
            border-radius: 12px; 
            color: white; 
            font-weight: bold; 
            font-size: 16px;
            cursor: pointer;
            pointer-events: auto;
            -webkit-appearance: none; /* Фикс для iOS */
        }

        .btn-add.trial { background: #27ae60; }
        .btn-add.pay { background: #2980b9; }

        .btn-edit { background: #f39c12; color: white; border: none; padding: 6px 10px; border-radius: 6px; margin-right: 5px; }
        .btn-del { background: #e74c3c; color: white; border: none; padding: 6px 10px; border-radius: 6px; }

        .toast { 
            position: fixed; 
            bottom: 20px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: #27ae60; 
            padding: 10px 20px; 
            border-radius: 20px; 
            display: none; 
            z-index: 1000;
        }
    </style>
</head>
<body>

    <div class="tabs">
        <button id="t-trial" class="tab-btn active trial" onclick="setTab('trial')">🕒 Триал</button>
        <button id="t-pay" class="tab-btn pay" onclick="setTab('pay')">💎 Платные</button>
    </div>

    <div id="list-trial" class="key-list active"></div>
    <div id="list-pay" class="key-list"></div>

    <div class="add-box">
        <h3 id="form-title">Добавить Ключ</h3>
        <input type="text" id="inName" placeholder="Название">
        <input type="text" id="inKey" placeholder="vless://...">
        <button id="add-btn" class="btn-add trial" onclick="handleSave()">Сохранить в Триал</button>
    </div>

    <div id="toast" class="toast">✅ Сохранено</div>

    <script>
        let tg = window.Telegram.WebApp;
        let allKeys = []; // Основной массив данных
        let currentTab = 'trial';
        let editIndex = -1;

        // 1. Парсим данные из URL
        const urlParams = new URLSearchParams(window.location.search);
        const dataStr = urlParams.get('data');
        if (dataStr) {
            try {
                allKeys = JSON.parse(decodeURIComponent(dataStr));
            } catch(e) { console.error("Ошибка парсинга:", e); }
        }
        const adminId = urlParams.get('admin_id');

        // 2. Отрисовка списка
        function render() {
            const tList = document.getElementById('list-trial');
            const pList = document.getElementById('list-pay');
            tList.innerHTML = ''; pList.innerHTML = '';

            allKeys.forEach((k, i) => {
                const item = document.createElement('div');
                item.className = 'key-item';
                item.innerHTML = `
                    <div style="flex:1; overflow:hidden;">
                        <span style="color:#ffa06d; font-weight:bold; display:block;">${k.name}</span>
                        <div style="font-size:12px; color:#aaa; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${k.key}</div>
                    </div>
                    <div style="display:flex;">
                        <button class="btn-edit" onclick="startEdit(${i})">✏️</button>
                        <button class="btn-del" onclick="removeKey(${i})">🗑</button>
                    </div>
                `;
                if (k.type === 'trial') tList.appendChild(item);
                else pList.appendChild(item);
            });
            tg.expand();
        }

        // 3. Переключение вкладок
        function setTab(t) {
            currentTab = t;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('t-' + t).classList.add('active');
            
            document.querySelectorAll('.key-list').forEach(l => l.classList.remove('active'));
            document.getElementById('list-' + t).classList.add('active');
            
            const btn = document.getElementById('add-btn');
            btn.className = 'btn-add ' + t;
            btn.innerText = 'Сохранить в ' + (t === 'trial' ? 'Триал' : 'Платные');
            cancelEdit();
        }

        function startEdit(i) {
            editIndex = i;
            const k = allKeys[i];
            document.getElementById('inName').value = k.name;
            document.getElementById('inKey').value = k.key;
            document.getElementById('form-title').innerText = "📝 Редактировать";
            document.getElementById('add-btn').innerText = "Обновить ключ";
        }

        function cancelEdit() {
            editIndex = -1;
            document.getElementById('inName').value = '';
            document.getElementById('inKey').value = '';
            document.getElementById('form-title').innerText = "Добавить Ключ";
        }

        async function handleSave() {
            const n = document.getElementById('inName').value.trim();
            const v = document.getElementById('inKey').value.trim();
            if(!n || !v) return alert('Заполни поля!');

            if(editIndex > -1) {
                allKeys[editIndex].name = n;
                allKeys[editIndex].key = v;
            } else {
                allKeys.push({ name: n, key: v, type: currentTab });
            }
            
            await sync(); // Отправка на сервер
            cancelEdit();
            render();
        }

        async function removeKey(i) {
            if(confirm('Удалить этот ключ?')) {
                allKeys.splice(i, 1);
                await sync();
                render();
            }
        }

        // ИСПРАВЛЕННАЯ ФУНКЦИЯ СИНХРОНИЗАЦИИ
        async function sync() {
            try {
                // Пытаемся отправить запрос
                const response = await fetch('http://146.103.118.40:8080/sync', {
                    method: 'POST',
                    mode: 'cors', 
                    headers: {
                        'Content-Type': 'application/json' // Вернул json, так как в боте мы ждем json
                    },
                    body: JSON.stringify({
                        admin_id: adminId,
                        payload: allKeys // Исправлено: было keys, стало allKeys
                    })
                });
                
                if (response.ok) {
                    const toast = document.getElementById('toast');
                    toast.style.display = 'block';
                    setTimeout(() => { toast.style.display = 'none'; }, 2000);
                } else {
                    alert("Ошибка сервера: " + response.status);
                }
            } catch (error) {
                console.error("Ошибка запроса:", error);
                alert("Ошибка сети. Попробуй открыть админку через 'Три точки -> Открыть в браузере'");
            }
        }

        render();
    </script>
</body>
</html>

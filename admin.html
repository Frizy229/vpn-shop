<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAVARKA VPN | CRM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Осенняя палитра и переменные */
        :root {
            --bg-dark: #120a08;
            --card-bg: #1c110f;
            --accent-orange: #d46a2a;
            --accent-gold: #e3a054;
            --text-main: #f5ece9;
            --text-muted: #a38c85;
            --danger: #cf3f3f;
            --success: #52a852;
            --glass: rgba(28, 17, 15, 0.85);
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg-dark); 
            color: var(--text-main); 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
        }

        .container { 
            width: 100%; 
            max-width: 800px; 
        }

        /* Навигация (Табы) */
        .tabs { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 20px; 
        }
        
        .tab-btn {
            flex: 1;
            padding: 15px;
            background: var(--card-bg);
            color: var(--text-muted);
            border: 1px solid #36221c;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .tab-btn.active {
            background: var(--accent-orange);
            color: #fff;
            border-color: var(--accent-gold);
            box-shadow: 0 0 15px rgba(212, 106, 42, 0.4);
        }

        .tab-content { 
            display: none; 
            animation: fadeIn 0.4s ease-in-out; 
        }

        /* Полный стиль для выпадающих списков */
        select {
            appearance: none !important;
            -webkit-appearance: none !important;
            -moz-appearance: none !important;
            
            /* Отступ справа, чтобы текст не касался стрелки */
            padding-right: 40px !important; 
            
            /* Рисуем кастомную стрелочку */
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e") !important;
            background-repeat: no-repeat !important;
            background-position: right 15px center !important;
            background-size: 16px !important;
            
            /* Базовые стили из твоего конфига */
            background-color: #0d0706;
            color: var(--text-main);
            border: 1px solid #36221c;
            border-radius: 8px;
            cursor: pointer;
        }
        
        /* Фикс для отображения вариантов в темной теме */
        select option {
            background-color: #0d0706;
            color: white;
        }
        
        .tab-content.active { 
            display: block; 
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Карточки и формы */
        .card { 
            background: var(--card-bg); 
            padding: 25px; 
            border-radius: 15px; 
            border: 1px solid #36221c; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: var(--accent-gold); font-size: 14px; }
        
        input, select, textarea { 
            width: 100%; 
            padding: 12px; 
            background: #0d0706; 
            border: 1px solid #36221c; 
            color: var(--text-main); 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-family: inherit; 
            transition: border 0.3s;
        }
        
        input:focus, select:focus, textarea:focus {
            border-color: var(--accent-orange);
            outline: none;
        }
        
        textarea { height: 150px; resize: vertical; font-family: monospace; font-size: 13px; }

        button.primary { 
            width: 100%; 
            padding: 15px; 
            background: linear-gradient(135deg, var(--accent-orange), #b5541e); 
            color: white; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 16px; 
            transition: 0.3s; 
            box-shadow: 0 4px 15px rgba(212, 106, 42, 0.3);
        }
        
        button.primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(212, 106, 42, 0.5); }

        /* Таблица истории */
        .toolbar { display: flex; gap: 10px; margin-bottom: 15px; }
        .toolbar input { flex: 2; }
        .toolbar select { flex: 1; }

        .key-list { display: flex; flex-direction: column; gap: 10px; max-height: 500px; overflow-y: auto; padding-right: 5px; }
        .key-list::-webkit-scrollbar { width: 6px; }
        .key-list::-webkit-scrollbar-thumb { background: var(--accent-orange); border-radius: 3px; }

        .key-item {
            background: #140b09;
            border: 1px solid #36221c;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
        }
        .key-item {
            display: flex !important;
            justify-content: space-between !important;
            align-items: center !important;
            padding: 15px !important;
            gap: 15px !important;
            background: var(--card-bg);
            border: 1px solid #36221c;
            border-radius: 12px;
            margin-bottom: 10px;
        }
        
        .key-item.expiring { border-left: 4px solid var(--danger); background: rgba(207, 63, 63, 0.05); }

        .key-info {
        flex: 1 !important;
        min-width: 0 !important; /* Критично для работы переноса текста */
        }
        .key-info h4 {
        margin: 0 0 5px 0 !important;
        word-break: break-all !important; /* Разбивает очень длинные ID/названия */
        white-space: normal !important;   /* Разрешает перенос на новую строку */
        line-height: 1.2 !important;
        color: var(--accent-gold) !important;
        }
        .key-info p { margin: 0; font-size: 12px; color: var(--text-muted); }
        .key-info .owner { color: #8bb4e5; font-weight: bold; }

        .key-actions {
        display: flex !important;
        flex-direction: column !important;
        gap: 10px !important;
        flex-shrink: 0 !important; /* Запрещает кнопкам сжиматься */
        align-items: center !important;
        }
        
        .key-actions button {
        background: none !important;
        border: none !important;
        padding: 5px !important;
        cursor: pointer !important;
        width: 30px !important;
        }
        .key-actions button:hover { color: var(--accent-orange); transform: scale(1.2); }
        .key-actions button.delete:hover { color: var(--danger); }

        /* Модальное окно (Glassmorphism) */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(5px);
            display: none; justify-content: center; align-items: center; z-index: 100;
            opacity: 0; transition: opacity 0.3s ease;
        }
        .modal-overlay.show { display: flex; opacity: 1; }
        .modal-content { background: var(--glass); padding: 25px; border-radius: 15px; border: 1px solid var(--accent-gold); width: 90%; max-width: 400px; }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('add')">➕ Синхронизация</button>
        <button class="tab-btn" onclick="switchTab('history')">📜 Менеджер ключей</button>
        <button class="tab-btn" onclick="performSync()"> 🔄 </button>
    </div>

    <div id="add" class="tab-content active card">
        <div class="form-group">
            <label>Префикс названия ключа:</label>
            <input type="text" id="keyPrefix" placeholder="Например: Zavarka_Trial_" value="Zavarka_Trial_">
        </div>
        <div class="form-group">
            <label for="subscriptionType">Тип подписки (Тариф):</label>
                <select id="subscriptionType">
                    <option value="trial">Trial (24 часа)</option>
                    <option value="1_month">Premium (1 месяц)</option>
                    <option value="3_months">Premium (3 месяца)</option>
                    <option value="6_months">Premium (6 месяцев)</option>
                    <option value="1_year">Premium (1 год)</option>
                </select>
        </div>
        <div class="form-group">
            <label>Список ключей (каждый с новой строки):</label>
            <textarea id="keysInput" placeholder="vless://...&#10;ss://..."></textarea>
        </div>
        <button class="primary" onclick="syncKeys()">Отправить в базу</button>
    </div>

    <div id="history" class="tab-content card">
        <div class="toolbar">
            <input type="text" id="searchInput" placeholder="Поиск по @username или названию..." onkeyup="renderHistory()">
            <select id="sortSelect" onchange="renderHistory()">
                <option value="newest">Сначала новые</option>
                <option value="expiring">Скоро истекают</option>
            </select>
        </div>
        <div class="key-list" id="keyList">
            <p style="text-align:center; color: var(--text-muted);">Загрузка базы...</p>
        </div>
    </div>
</div>

<div class="modal-overlay" id="editModal">
    <div class="modal-content">
        <h3 style="color: var(--accent-gold); margin-top:0;">Редактировать ключ</h3>
        <input type="hidden" id="editKeyId">
        <div class="form-group">
            <label>Название ключа:</label>
            <input type="text" id="editName">
        </div>
        <div class="form-group">
            <label>Владелец (@username):</label>
            <input type="text" id="editOwner" placeholder="Не выдан">
        </div>
        <div class="form-group" style="display: flex; gap:10px;">
            <button class="primary" style="background: #444;" onclick="closeModal()">Отмена</button>
            <button class="primary" onclick="saveEdit()">Сохранить</button>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    const ADMIN_ID = tg.initDataUnsafe?.user?.id || 6922271768; // Резервный ID для ПК
    const API_URL = 'https://zavarka.fun';

    let keysDatabase = [];

    // Переключение вкладок
    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
        
        if(tabId === 'history') loadHistory();
    }

document.addEventListener('DOMContentLoaded', () => {
    const typeSelect = document.getElementById('subscriptionType');
    const prefixInput = document.getElementById('keyPrefix');

    const prefixes = {
        'trial': 'Zavarka_Trial_',
        '1_month': 'Zavarka_1mec_',
        '3_months': 'Zavarka_3mec_',
        '6_months': 'Zavarka_6mec_',
        '1_year': 'Zavarka_1god_'
    };

    typeSelect.addEventListener('change', () => {
        if (prefixes[typeSelect.value]) {
            prefixInput.value = prefixes[typeSelect.value];
        }
    });
});
    // Добавление ключей
async function syncKeys() {
    const prefix = document.getElementById('keyPrefix').value.trim();
    // ИСПРАВЛЕНО: берем значение из subscriptionType, а не keyType
    const type = document.getElementById('subscriptionType').value; 
    const keysText = document.getElementById('keysInput').value;
    const rawKeys = keysText.split('\n').filter(line => line.trim() !== "");

    if (rawKeys.length === 0) return tg.showAlert("Список пуст!");

    try {
        const response = await fetch(`${API_URL}/admin/keys`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                admin_id: ADMIN_ID, 
                prefix: prefix, 
                type: type, 
                keys: rawKeys 
            })
        });

        if (response.ok) {
            const result = await response.json();
            tg.showScanQrPopup; // Можно убрать, если не нужно
            tg.showAlert(`✅ Успешно добавлено ключей: ${rawKeys.length}`);
            document.getElementById('keysInput').value = '';
        } else {
            tg.showAlert("❌ Ошибка доступа.");
        }
    } catch (e) {
        tg.showAlert("❌ Ошибка сети.");
    }
}

    // Загрузка истории
    async function loadHistory() {
        try {
            const response = await fetch(`${API_URL}/admin/keys?admin_id=${ADMIN_ID}`);
            if (response.ok) {
                keysDatabase = await response.json();
                renderHistory();
            }
        } catch (e) {
            document.getElementById('keyList').innerHTML = `<p style="color: var(--danger); text-align:center;">Ошибка загрузки</p>`;
        }
    }

// Отрисовка с фильтрами и сортировкой
function renderHistory() {
    const list = document.getElementById('keyList');
    const search = document.getElementById('searchInput').value.toLowerCase();
    const sort = document.getElementById('sortSelect').value;

    let filtered = keysDatabase.filter(k => 
        (k.name && k.name.toLowerCase().includes(search)) || 
        (k.owner && k.owner.toLowerCase().includes(search))
    );

    // Сортировка
    if (sort === 'newest') {
        filtered.sort((a, b) => b.created_at - a.created_at);
    } else if (sort === 'expiring') {
        filtered.sort((a, b) => {
            if (!a.expires_at) return 1;
            if (!b.expires_at) return -1;
            return a.expires_at - b.expires_at;
        });
    }

    list.innerHTML = '';
    if (filtered.length === 0) {
        list.innerHTML = '<p style="text-align:center; color: var(--text-muted);">Ничего не найдено</p>';
        return;
    }

    const now = Date.now() / 1000;

    filtered.forEach(k => {
        const isIssued = k.owner !== null && k.owner !== 'Свободен';
        const expires = k.expires_at ? new Date(k.expires_at * 1000).toLocaleString('ru-RU') : 'Не активирован';
        const timeLeft = k.expires_at ? (k.expires_at - now) : 999999;
        const isExpiringSoon = isIssued && timeLeft > 0 && timeLeft < 86400; // Менее 24 часов

        const ownerText = isIssued ? `<span class="owner">${k.owner}</span>` : 'Свободен';

        // ИСПОЛЬЗУЕМ КЛАССЫ key-info И key-actions ДЛЯ ПРАВИЛЬНОЙ ВЕРСТКИ
        list.innerHTML += `
            <div class="key-item ${isExpiringSoon ? 'expiring' : ''}">
                <div class="key-info">
                    <h4>${k.name || 'Без названия'}</h4>
                    <p>👤 Владелец: ${ownerText} | Тариф: ${k.type.replace('_', ' ')}</p>
                    <p>🕒 Истекает: <span style="color: ${isExpiringSoon ? 'var(--danger)' : 'inherit'}">${expires}</span></p>
                </div>
                <div class="key-actions">
                    <button class="edit-btn" onclick="openModal('${k.id}', '${k.name}', '${k.owner || ''}')">✏️</button>
                    <button class="delete-btn" onclick="deleteKey('${k.id}')">🗑️</button>
                </div>
            </div>
        `;
    });
}

    // Модальное окно
    function openModal(id, name, owner) {
        document.getElementById('editKeyId').value = id;
        document.getElementById('editName').value = name;
        document.getElementById('editOwner').value = owner;
        document.getElementById('editModal').classList.add('show');
    }
    function closeModal() { document.getElementById('editModal').classList.remove('show'); }

    // Редактирование ключа
    async function saveEdit() {
        const id = document.getElementById('editKeyId').value;
        const name = document.getElementById('editName').value;
        let owner = document.getElementById('editOwner').value.trim();
        if (owner === "") owner = null;

        try {
            await fetch(`${API_URL}/admin/keys/${id}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ admin_id: ADMIN_ID, name: name, owner: owner })
            });
            closeModal();
            loadHistory();
        } catch (e) { tg.showAlert("Ошибка сохранения"); }
    }

async function deleteKey(keyId) {
    if (!confirm("Удалить этот ключ навсегда?")) return;

    try {
        const response = await fetch(`${API_URL}/admin/keys/${keyId}`, {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ admin_id: ADMIN_ID }) // Передаем ID в body
        });

        if (response.ok) {
            tg.showAlert("✅ Ключ удален");
            renderHistory(); // Обновляем список
        } else {
            tg.showAlert("❌ Ошибка доступа (403)");
        }
    } catch (e) {
        tg.showAlert("❌ Ошибка сети при удалении");
    }
}

    // 2. ФУНКЦИЯ СИНХРОНИЗАЦИИ (Очистка фантомных ключей)
async function performSync() {
    try {
        const response = await fetch(`${API_URL}/admin/sync`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ admin_id: ADMIN_ID })
        });

        if (response.ok) {
            const result = await response.json();
            tg.showAlert(`✅ Синхронизация окончена! Удалено лишних: ${result.removed}`);
            renderHistory();
        }
    } catch (e) {
        tg.showAlert("❌ Ошибка синхронизации");
    }
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZAVARKA VPN Admin</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; margin: 0; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; position: sticky; top: 0; background: #121212; z-index: 10; padding-bottom: 10px; }
        .tab-btn { flex: 1; padding: 12px; border-radius: 10px; border: none; background: #222; color: #666; font-weight: bold; }
        .tab-btn.active.trial { background: #27ae60; color: white; }
        .tab-btn.active.pay { background: #2980b9; color: white; }
        
        .key-list { display: none; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .key-list.active { display: flex; }
        
        .key-item { background: #1e1e1e; padding: 12px; border-radius: 10px; border: 1px solid #333; }
        .key-row { display: flex; justify-content: space-between; align-items: flex-start; }
        .key-data { flex: 1; overflow: hidden; }
        .key-name { font-weight: bold; color: #ffa06d; display: block; margin-bottom: 5px; }
        .key-val { font-family: monospace; font-size: 0.8em; color: #eee; word-break: break-all; }
        
        .actions { display: flex; gap: 8px; margin-top: 10px; }
        .btn-edit { background: #f39c12; color: white; border: none; padding: 6px 12px; border-radius: 6px; }
        .btn-del { background: #e74c3c; color: white; border: none; padding: 6px 12px; border-radius: 6px; }

        .add-box { background: #1a1a1a; padding: 15px; border-radius: 15px; border: 1px dashed #444; margin-top: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #333; background: #252525; color: white; box-sizing: border-box; }
        .btn-add { width: 100%; padding: 15px; border: none; border-radius: 10px; color: white; font-weight: bold; margin-top: 10px; }
        .btn-add.trial { background: #27ae60; }
        .btn-add.pay { background: #2980b9; }
        
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #27ae60; padding: 10px 20px; border-radius: 20px; display: none; }
    </style>
</head>
<body>

    <div class="tabs">
        <button id="t-trial" class="tab-btn active trial" onclick="setTab('trial')">🕒 Триал</button>
        <button id="t-pay" class="tab-btn pay" onclick="setTab('pay')">💎 Платные</button>
    </div>

    <div id="list-trial" class="key-list active"></div>
    <div id="list-pay" class="key-list"></div>

    <div class="add-box">
        <h3 id="form-title">Добавить Ключ</h3>
        <input type="text" id="inName" placeholder="Название">
        <input type="text" id="inKey" placeholder="vless://...">
        <button id="add-btn" class="btn-add trial" onclick="handleSave()">Сохранить в Триал</button>
    </div>

    <div id="toast" class="toast">✅ Сохранено</div>

    <script>
        let tg = window.Telegram.WebApp;
        let allKeys = [];
        let currentTab = 'trial';
        let editIndex = -1;

        const urlParams = new URLSearchParams(window.location.search);
        allKeys = JSON.parse(decodeURIComponent(urlParams.get('data') || '[]'));
        const adminId = urlParams.get('admin_id');

        function render() {
            const tList = document.getElementById('list-trial');
            const pList = document.getElementById('list-pay');
            tList.innerHTML = ''; pList.innerHTML = '';

            allKeys.forEach((k, i) => {
                const item = document.createElement('div');
                item.className = 'key-item';
                item.innerHTML = `
                    <div class="key-data">
                        <span class="key-name">${k.name}</span>
                        <div class="key-val">${k.key}</div>
                    </div>
                    <div class="actions">
                        <button class="btn-edit" onclick="startEdit(${i})">✏️ Править</button>
                        <button class="btn-del" onclick="removeKey(${i})">🗑 Удалить</button>
                    </div>
                `;
                (k.type === 'trial' ? tList : pList).appendChild(item);
            });
            tg.expand();
        }

        function setTab(t) {
            currentTab = t;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('t-' + t).classList.add('active');
            document.querySelectorAll('.key-list').forEach(l => l.classList.remove('active'));
            document.getElementById('list-' + t).classList.add('active');
            
            const btn = document.getElementById('add-btn');
            btn.className = 'btn-add ' + t;
            btn.innerText = 'Сохранить в ' + (t === 'trial' ? 'Триал' : 'Платные');
            cancelEdit();
        }

        function startEdit(i) {
            editIndex = i;
            const k = allKeys[i];
            document.getElementById('inName').value = k.name;
            document.getElementById('inKey').value = k.key;
            document.getElementById('form-title').innerText = "📝 Редактировать";
            document.getElementById('add-btn').innerText = "Обновить данные";
            window.scrollTo(0, document.body.scrollHeight);
        }

        function cancelEdit() {
            editIndex = -1;
            document.getElementById('inName').value = '';
            document.getElementById('inKey').value = '';
            document.getElementById('form-title').innerText = "Добавить Ключ";
        }

        async function handleSave() {
            const n = document.getElementById('inName').value;
            const v = document.getElementById('inKey').value;
            if(!n || !v) return;

            if(editIndex > -1) {
                allKeys[editIndex].name = n;
                allKeys[editIndex].key = v;
            } else {
                allKeys.push({ name: n, key: v, type: currentTab });
            }
            
            await sync();
            cancelEdit();
            render();
        }

        async function removeKey(i) {
            if(confirm('Удалить?')) {
                allKeys.splice(i, 1);
                await sync();
                render();
            }
        }

        async function sync() {
            // Теперь мы НЕ закрываем окно, а просто уведомляем бота
            // Если у тебя есть выделенный IP сервера, можно слать fetch на него.
            // Но для простоты пока оставим передачу через sendData, просто НЕ будем вызывать tg.close()
            tg.sendData(JSON.stringify({ action: 'sync_all', payload: allKeys }));
            
            // Показываем уведомление
            const t = document.getElementById('toast');
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2000);
            tg.HapticFeedback.notificationOccurred('success');
        }

        render();
    </script>
</body>
</html>

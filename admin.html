<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAVARKA VPN Admin</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { 
            flex: 1; padding: 10px; background: #333; border: none; 
            color: #888; cursor: pointer; border-radius: 8px; font-weight: bold;
        }
        .tab-btn.active { background: #d35400; color: white; }
        
        .key-list { display: none; flex-direction: column; gap: 10px; }
        .key-list.active { display: flex; }
        
        .key-item { 
            background: #2c2c2c; padding: 12px; border-radius: 8px; 
            display: flex; justify-content: space-between; align-items: center;
            border-left: 4px solid #d35400;
        }
        .key-info { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-right: 10px; }
        .key-name { font-size: 0.9em; color: #aaa; display: block; }
        .key-val { font-family: monospace; color: #fff; }
        
        .del-btn { background: #c0392b; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        
        .add-section { margin-top: 30px; padding: 15px; background: #222; border-radius: 10px; border: 1px dashed #444; }
        input, select { width: 100%; padding: 10px; margin: 5px 0 15px; border-radius: 5px; border: 1px solid #444; background: #333; color: white; box-sizing: border-box; }
        .save-btn { width: 100%; padding: 15px; background: #27ae60; border: none; color: white; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <h2>⚙️ Админ-панель</h2>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('trial')">🕒 Триал</button>
        <button class="tab-btn" onclick="showTab('pay')">💎 Платные</button>
    </div>

    <div id="trial-list" class="key-list active"></div>
    <div id="pay-list" class="key-list"></div>

    <div class="add-section">
        <h3>➕ Добавить ключ</h3>
        <label>Название (для тебя):</label>
        <input type="text" id="newName" placeholder="Напр: Сервер Финляндия">
        
        <label>Ключ (vless://...):</label>
        <input type="text" id="newKey" placeholder="Вставь ссылку ключа">
        
        <label>Тип:</label>
        <select id="newType">
            <option value="trial">🕒 Триал (24ч)</option>
            <option value="pay">💎 Платный (Месяц)</option>
        </select>
        
        <button class="save-btn" onclick="addKey()">Добавить и Синхронизировать</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        let allKeys = [];

        // Получаем данные из URL
        const params = new URLSearchParams(window.location.search);
        const rawData = params.get('data');
        if (rawData) {
            allKeys = JSON.parse(decodeURIComponent(rawData));
        }

        function render() {
            const trialCont = document.getElementById('trial-list');
            const payCont = document.getElementById('pay-list');
            trialCont.innerHTML = '';
            payCont.innerHTML = '';

            allKeys.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'key-item';
                div.innerHTML = `
                    <div class="key-info">
                        <span class="key-name">${item.name}</span>
                        <span class="key-val">${item.key.substring(0, 20)}...</span>
                    </div>
                    <button class="del-btn" onclick="removeKey(${index})">❌</button>
                `;
                if (item.type === 'trial') trialCont.appendChild(div);
                else payCont.appendChild(div);
            });
        }

        function showTab(type) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.key-list').forEach(l => l.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(type + '-list').classList.add('active');
        }

        function addKey() {
            const name = document.getElementById('newName').value;
            const key = document.getElementById('newKey').value;
            const type = document.getElementById('newType').value;

            if (!name || !key) return alert('Заполни все поля!');

            allKeys.push({ name, key, type });
            sync();
        }

        function removeKey(index) {
            allKeys.splice(index, 1);
            sync();
        }

        function sync() {
            tg.sendData(JSON.stringify({
                action: 'sync_all',
                payload: allKeys
            }));
            tg.close();
        }

        render();
        tg.expand();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZAVARKA VPN Admin</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #121212; color: white; padding: 20px; margin: 0; -webkit-tap-highlight-color: transparent; }
        h2 { text-align: center; color: #d35400; margin-bottom: 20px; }
        
        /* Фикс кнопок: добавили z-index и относительное позиционирование */
        .tabs { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 25px; 
            position: relative; 
            z-index: 999; 
        }
        
        .tab-btn { 
            flex: 1; 
            padding: 15px; 
            background: #252525; 
            border: none; 
            color: #777; 
            cursor: pointer; 
            border-radius: 12px; 
            font-weight: bold; 
            font-size: 15px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        /* Цвета активных вкладок */
        .tab-btn.active.trial { background: #27ae60 !important; color: white !important; }
        .tab-btn.active.pay { background: #2980b9 !important; color: white !important; }
        
        .key-list { display: none; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .key-list.active { display: flex; }
        
        .key-item { 
            background: #1e1e1e; padding: 14px; border-radius: 10px; 
            display: flex; justify-content: space-between; align-items: center;
            border-left: 4px solid #d35400;
        }
        .key-info { overflow: hidden; white-space: nowrap; }
        .key-name { font-size: 0.8em; color: #aaa; display: block; }
        .key-val { font-family: monospace; color: #fff; font-size: 0.9em; }
        
        .del-btn { background: #e74c3c; color: white; border: none; padding: 8px 12px; border-radius: 8px; }
        
        .add-section { 
            margin-top: 20px; padding: 20px; background: #1a1a1a; border-radius: 15px; 
            border: 1px solid #333; position: relative; z-index: 1;
        }
        input { 
            width: 100%; padding: 14px; margin: 8px 0 18px; border-radius: 10px; 
            border: 1px solid #333; background: #252525; color: white; box-sizing: border-box; font-size: 16px;
        }
        
        .save-btn { 
            width: 100%; padding: 16px; border: none; 
            color: white; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1em;
        }
        .save-btn.trial { background: #27ae60; }
        .save-btn.pay { background: #2980b9; }

        .empty-hint { text-align: center; color: #444; padding: 20px; }
    </style>
</head>
<body>

    <h2>⚙️ Админ-панель</h2>

    <div class="tabs">
        <button id="btn-trial" class="tab-btn active trial" onclick="showTab('trial')">🕒 Триал</button>
        <button id="btn-pay" class="tab-btn pay" onclick="showTab('pay')">💎 Платные</button>
    </div>

    <div id="trial-list" class="key-list active"></div>
    <div id="pay-list" class="key-list"></div>

    <div class="add-section">
        <h3>➕ <span id="type-label" style="color: #27ae60;">Добавить Триал</span></h3>
        <input type="text" id="newName" placeholder="Название (напр. Финляндия)">
        <input type="text" id="newKey" placeholder="vless://...">
        <button id="main-save-btn" class="save-btn trial" onclick="addKey()">Добавить в Триал</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        let allKeys = [];
        let currentTab = 'trial';

        const params = new URLSearchParams(window.location.search);
        const rawData = params.get('data');
        if (rawData) allKeys = JSON.parse(decodeURIComponent(rawData));

        function render() {
            const trialCont = document.getElementById('trial-list');
            const payCont = document.getElementById('pay-list');
            trialCont.innerHTML = ''; payCont.innerHTML = '';

            allKeys.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'key-item';
                div.innerHTML = `
                    <div class="key-info"><span class="key-name">${item.name}</span><span class="key-val">${item.key.substring(0, 15)}...</span></div>
                    <button class="del-btn" onclick="removeKey(${index})">❌</button>
                `;
                if (item.type === 'trial') trialCont.appendChild(div);
                else payCont.appendChild(div);
            });
            if (!trialCont.innerHTML) trialCont.innerHTML = '<div class="empty-hint">Триальных ключей нет</div>';
            if (!payCont.innerHTML) payCont.innerHTML = '<div class="empty-hint">Платных ключей нет</div>';
        }

        function showTab(type) {
            currentTab = type;
            console.log('Switching to:', type); // Для отладки
            
            // Сброс классов
            document.getElementById('btn-trial').classList.remove('active');
            document.getElementById('btn-pay').classList.remove('active');
            
            // Активация нужной
            document.getElementById('btn-' + type).classList.add('active');
            
            document.getElementById('trial-list').classList.toggle('active', type === 'trial');
            document.getElementById('pay-list').classList.toggle('active', type === 'pay');

            const label = document.getElementById('type-label');
            const btn = document.getElementById('main-save-btn');
            
            if (type === 'trial') {
                label.innerText = 'Добавить Триал';
                label.style.color = '#27ae60';
                btn.innerText = 'Добавить в Триал';
                btn.className = 'save-btn trial';
            } else {
                label.innerText = 'Добавить Платный';
                label.style.color = '#2980b9';
                btn.innerText = 'Добавить в Платные';
                btn.className = 'save-btn pay';
            }
        }

        function addKey() {
            const name = document.getElementById('newName').value;
            const key = document.getElementById('newKey').value;
            if (!name || !key) return alert('Заполни поля!');
            allKeys.push({ name, key, type: currentTab });
            sync();
        }

        function removeKey(index) {
            if (confirm('Удалить?')) { allKeys.splice(index, 1); sync(); }
        }

        function sync() {
            tg.sendData(JSON.stringify({ action: 'sync_all', payload: allKeys }));
            tg.close();
        }

        render();
        tg.expand();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="lava-verify" content="5a55bac0fe369be8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0c0f13;
            --card-bg: rgba(22, 26, 31, 0.8);
            --accent-color: #248bed;
            --text-main: #ffffff;
            --text-secondary: #94a3b8;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            background-attachment: fixed;
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Чтобы контент начинался сверху */
            min-height: 100vh;
            overflow-x: hidden;
            /* Начальный фон с радиальным градиентом для свечения */
            background-image: radial-gradient(circle at center, #1a263a 0%, #0c0f13 100%);
        }

        /* Интерактивный слой свечения */
        .spotlight {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(36, 139, 237, 0.15) 0%, transparent 50%);
            z-index: 1;
        }

        .grid-container {
            position: relative;
            z-index: 2;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px; /* Расстояние между заголовком и карточками */
        }

        h2 {
            font-size: clamp(24px, 6vw, 32px);
            text-align: center;
            margin: 0;
            background: linear-gradient(90deg, #fff, var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .cards-wrapper {
            display: grid;
            gap: 20px;
            justify-content: center;
        }

        /* Адаптивность сетки */
        @media (max-width: 850px) {
            .cards-wrapper { grid-template-columns: 1fr; max-width: 380px; width: 100%; }
        }
        @media (min-width: 851px) {
            .cards-wrapper { grid-template-columns: repeat(4, 210px); }
        }

        .tariff-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .tariff-card:hover {
            border-color: var(--accent-color);
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }

        .featured {
            border: 1.5px solid var(--accent-color);
            background: linear-gradient(145deg, rgba(22, 26, 31, 0.9), rgba(15, 33, 47, 0.9));
        }

        .badge {
            position: absolute;
            top: -12px;
            background: var(--accent-color);
            color: white;
            font-size: 10px;
            font-weight: 900;
            padding: 4px 12px;
            border-radius: 20px;
            text-transform: uppercase;
        }

        .info h3 { margin: 0 0 8px; font-size: 20px; }
        .info p { margin: 0; font-size: 13px; color: var(--text-secondary); min-height: 32px; }

        .price-section {
            margin-top: 25px;
            width: 100%;
        }

        .price {
            font-size: 32px;
            font-weight: 900;
            display: block;
            margin-bottom: 15px;
        }

        .btn-select {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }

        .btn-select:active { transform: scale(0.95); opacity: 0.9; }

        /* Эффект свечения под кнопкой */
        .featured .btn-select {
            box-shadow: 0 4px 15px rgba(36, 139, 237, 0.4);
        }
    </style>
</head>
<body>

    <div class="spotlight"></div>

    <div class="grid-container">
        <h2>ZAVARKA Premium</h2>

        <div class="cards-wrapper">
            <div class="tariff-card">
                <div class="info">
                    <h3>🚀 1 Месяц</h3>
                    <p>Базовый доступ</p>
                </div>
                <div class="price-section">
                    <span class="price">150₽</span>
                    <button class="btn-select" onclick="sendOrder(150, '1 месяц')">Выбрать</button>
                </div>
            </div>

            <div class="tariff-card featured">
                <div class="badge">Популярно</div>
                <div class="info">
                    <h3>💎 3 Месяца</h3>
                    <p>Экономия 100₽</p>
                </div>
                <div class="price-section">
                    <span class="price">350₽</span>
                    <button class="btn-select" onclick="sendOrder(350, '3 месяца')">Выбрать</button>
                </div>
            </div>

            <div class="tariff-card featured">
                <div class="badge">Выгода -30%</div>
                <div class="info">
                    <h3>⚡️ 6 Месяцев</h3>
                    <p>Лучшая цена</p>
                </div>
                <div class="price-section">
                    <span class="price">600₽</span>
                    <button class="btn-select" onclick="sendOrder(600, '6 месяцев')">Выбрать</button>
                </div>
            </div>

            <div class="tariff-card">
                <div class="info">
                    <h3>👑 1 Год</h3>
                    <p>Премиум навсегда</p>
                </div>
                <div class="price-section">
                    <span class="price">1000₽</span>
                    <button class="btn-select" onclick="sendOrder(1000, '1 год')">Выбрать</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor('#0c0f13');

        // Скрипт для свечения за мышкой
        const spotlight = document.querySelector('.spotlight');
        window.addEventListener('mousemove', e => {
            const x = (e.clientX / window.innerWidth) * 100;
            const y = (e.clientY / window.innerHeight) * 100;
            spotlight.style.setProperty('--x', `${x}%`);
            spotlight.style.setProperty('--y', `${y}%`);
        });

        function sendOrder(amount, label) {
            tg.sendData(JSON.stringify({amount: amount, tariff: label}));
            tg.close();
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="lava-verify" content="5a55bac0fe369be8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #13100d;
            --card-bg: rgba(31, 26, 21, 0.95);
            --accent-color: #d65a2d;
            --accent-gold: #ffcf4b;
            --text-main: #f5f0e6;
            --text-secondary: #b0a494;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: radial-gradient(circle at center, #1f1a15 0%, #13100d 100%);
        }

        /* Уменьшенное аккуратное свечение */
        .spotlight {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(255, 190, 80, 0.06) 0%, transparent 15%);
            z-index: 1;
        }

        .main-wrapper {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding: 40px 20px;
        }

        h2 {
            font-size: clamp(28px, 5vw, 40px);
            margin: 0 0 80px 0; /* Высокий отступ от карточек */
            background: linear-gradient(90deg, var(--accent-gold), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .cards-container {
            display: grid;
            gap: 25px;
            justify-content: center;
        }

        @media (min-width: 851px) {
            .cards-container { grid-template-columns: repeat(4, 230px); }
        }
        @media (max-width: 850px) {
            .cards-container { grid-template-columns: 1fr; width: 100%; max-width: 360px; }
            h2 { margin-bottom: 50px; }
        }

        .tariff-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 32px;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
        }

        .tariff-card:hover {
            border-color: var(--accent-gold);
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .featured { border: 2px solid var(--accent-color); }

        .price { font-size: 32px; font-weight: 900; margin: 20px 0; }

        .btn-select {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 20px;
            width: 100%;
            font-weight: 800;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="spotlight"></div>
    <div class="main-wrapper">
        <h2>ZAVARKA Premium</h2>
        <div class="cards-container">
            <div class="tariff-card">
                <h3>🚀 1 Месяц</h3>
                <div class="price">150₽</div>
                <button class="btn-select" onclick="buy(150, '1 месяц')">Купить</button>
            </div>
            <div class="tariff-card featured">
                <h3>💎 3 Месяца</h3>
                <div class="price">350₽</div>
                <button class="btn-select" onclick="buy(350, '3 месяца')">Купить</button>
            </div>
            <div class="tariff-card featured">
                <h3>⚡️ 6 Месяцев</h3>
                <div class="price">600₽</div>
                <button class="btn-select" onclick="buy(600, '6 месяцев')">Купить</button>
            </div>
            <div class="tariff-card">
                <h3>👑 1 Год</h3>
                <div class="price">1000₽</div>
                <button class="btn-select" onclick="sendOrder(1000, '1 год')">Купить</button>
            </div>
        </div>
    </div>
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor('#13100d');

        const spotlight = document.querySelector('.spotlight');
        window.addEventListener('mousemove', e => {
            spotlight.style.setProperty('--x', `${(e.clientX / window.innerWidth) * 100}%`);
            spotlight.style.setProperty('--y', `${(e.clientY / window.innerHeight) * 100}%`);
        });

        function buy(amount, label) {
            tg.sendData(JSON.stringify({amount: amount, tariff: label}));
            tg.close();
        }
    </script>
</body>
</html>

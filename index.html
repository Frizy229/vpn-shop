    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            /* --- ОСЕННЯЯ ЦВЕТОВАЯ ПАЛИТРА --- */
            --bg-color: #13100d; /* Глубокий темно-коричневый, как кора */
            --card-bg: rgba(31, 26, 21, 0.9); /* Тень от сухих листьев */
            --accent-color: #d65a2d; /* Насыщенный терракотовый / жженый оранжевый (Клен) */
            --accent-gold: #ffcf4b; /* Яркое золото (Дуб/Осина) */
            --text-main: #f5f0e6; /* Топленое молоко, мягкий белый */
            --text-secondary: #b0a494; /* Приглушенный серо-коричневый */
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            /* Радиальный градиент с теплым оттенком */
            background-image: radial-gradient(circle at center, #1f1a15 0%, #13100d 100%);
        }

        /* Теплое янтарное свечение - уменьшенный размер */
        .spotlight {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            /* Янтарный блик */
            background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(255, 190, 80, 0.08) 0%, transparent 25%);
            z-index: 1;
        }

        .main-wrapper {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        h2 {
            font-size: clamp(26px, 5vw, 36px);
            text-align: center;
            margin: 0 0 60px 0;
            /* Градиент от золотого к терракотовому */
            background: linear-gradient(90deg, var(--accent-gold), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .cards-container {
            display: grid;
            gap: 20px;
            justify-content: center;
        }

        @media (max-width: 850px) {
            .cards-container { 
                grid-template-columns: 1fr; 
                max-width: 360px; 
                width: 100%; 
            }
            h2 { margin-bottom: 40px; }
        }
        @media (min-width: 851px) {
            .cards-container { 
                grid-template-columns: repeat(4, 220px); 
            }
        }

        .tariff-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 28px;
            padding: 35px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .tariff-card:hover {
            border-color: var(--accent-gold);
            transform: translateY(-10px);
            background: rgba(40, 34, 28, 0.95);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

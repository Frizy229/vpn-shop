
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="lava-verify" content="5a55bac0fe369be8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>ZAVARKA VPN</title>
    <style>
        :root {
            --bg-color: #13100d;
            --card-bg: rgba(31, 26, 21, 0.95);
            --accent-color: #d65a2d;
            --accent-gold: #ffcf4b;
            --text-main: #f5f0e6;
            --text-secondary: #b0a494;
            --skeleton-base: #1f1a15;
            --skeleton-shine: #2a241d;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow-x: hidden; background-color: var(--bg-color); }
        body { color: var(--text-main); font-family: -apple-system, system-ui, sans-serif; display: flex; flex-direction: column; min-height: 100vh; background-image: radial-gradient(circle at center, #1f1a15 0%, #13100d 100%); }

        .spotlight { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(255, 190, 80, 0.06) 0%, transparent 15%); z-index: 1; }
        .main-wrapper { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 1200px; margin: 0 auto; padding: 20px 15px 40px; flex-grow: 1; }

        h2 { font-size: clamp(24px, 8vw, 40px); margin: 0 0 20px 0; background: linear-gradient(90deg, var(--accent-gold), var(--accent-color)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; text-align: center; }

        .tabs-nav { display: flex; background: rgba(255, 255, 255, 0.05); border-radius: 20px; padding: 5px; margin-bottom: 30px; width: 100%; max-width: 400px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .tab-btn { flex: 1; padding: 12px; border: none; background: transparent; color: var(--text-secondary); font-weight: bold; border-radius: 15px; cursor: pointer; transition: 0.3s; font-size: 14px; }
        .tab-btn.active { background: var(--accent-color); color: white; }

        .content-section { display: none; width: 100%; flex-direction: column; align-items: center; }
        .content-section.active { display: flex; }

        /* ИЗМЕНЕНО: minmax(260px, 1fr) заменен на 260px + добавлено margin: 0 auto для строгой центровки */
        .cards-container { display: grid; grid-template-columns: repeat(auto-fit, 260px); justify-content: center; gap: 20px; width: 100%; max-width: 1100px; padding: 10px 0; margin: 0 auto; }
        #skeleton-screen { display: grid; width: 100%; }
        .skeleton-card { background: var(--skeleton-base); border-radius: 28px; height: 350px; position: relative; overflow: hidden; }
        .skeleton-card::after { content: ""; position: absolute; top: 0; right: 0; bottom: 0; left: 0; background: linear-gradient(90deg, transparent, var(--skeleton-shine), transparent); animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
        
        /* ИЗМЕНЕНО: Добавлены стили для плавных анимаций и тени */
        .tariff-card { background: var(--card-bg); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 28px; padding: 35px 20px 25px; display: flex; flex-direction: column; align-items: center; text-align: center; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease, border-color 0.4s ease; position: relative; }
        .tariff-card:hover { transform: translateY(-10px) scale(1.03); z-index: 10; box-shadow: 0 15px 30px rgba(0,0,0,0.5); border-color: rgba(255, 255, 255, 0.2); }
        
        .js-reveal { opacity: 0; transform: translateY(20px); transition: 0.5s ease-out, transform 0.5s ease-out; }
        .js-reveal.active { opacity: 1; transform: translateY(0); }
        .featured { border: 2px solid var(--accent-color); }
        .badge { position: absolute; top: -10px; background: var(--accent-color); color: white; font-size: 10px; font-weight: 900; padding: 5px 12px; border-radius: 20px; text-transform: uppercase; }
        .price { font-size: 30px; font-weight: 900; margin: 15px 0; color: #fff; }
        .btn-select { background: var(--accent-color); color: white; border: none; padding: 14px; border-radius: 18px; width: 100%; font-weight: 800; font-size: 16px; cursor: pointer; transition: transform 0.2s, background 0.3s; }
        .btn-select:active { transform: scale(0.96); }

        /* ИЗМЕНЕНО: Новые классы для разнообразного выделения тарифов */
        .card-3m { border: 2px solid var(--accent-color); box-shadow: 0 0 15px rgba(214, 90, 45, 0.15); }
        .card-3m:hover { box-shadow: 0 15px 30px rgba(214, 90, 45, 0.4), 0 0 20px rgba(214, 90, 45, 0.5); border-color: #ff784e; }

        .card-6m { border: 2px solid var(--accent-gold); box-shadow: 0 0 15px rgba(255, 207, 75, 0.15); }
        .card-6m .badge { background: var(--accent-gold); color: #13100d; }
        .card-6m:hover { box-shadow: 0 15px 30px rgba(255, 207, 75, 0.4), 0 0 20px rgba(255, 207, 75, 0.5); border-color: #ffdf70; }

        .profile-card { background: var(--card-bg); border-radius: 32px; padding: 30px; width: 100%; max-width: 500px; border: 1px solid rgba(255, 255, 255, 0.05); text-align: left; }
        .user-info-header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
        .user-avatar { width: 50px; height: 50px; background: var(--accent-color); border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; }
        
        .status-block { background: rgba(255,255,255,0.03); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 14px; }
        .info-label { color: var(--text-secondary); }
        .info-value { color: #fff; font-weight: bold; }

        .key-box { background: #000; border-radius: 15px; padding: 15px; margin-top: 10px; display: flex; align-items: center; gap: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .key-text { flex: 1; font-family: monospace; font-size: 12px; color: var(--accent-gold); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .copy-btn { background: var(--accent-color); border: none; color: white; padding: 8px 15px; border-radius: 10px; font-size: 12px; font-weight: bold; cursor: pointer; }


        .card-1y { border: 2px solid #b339f4; box-shadow: 0 0 15px rgba(179, 57, 244, 0.15); background: linear-gradient(180deg, var(--card-bg) 0%, rgba(179, 57, 244, 0.05) 100%); }
        .card-1y:hover { box-shadow: 0 15px 30px rgba(179, 57, 244, 0.4), 0 0 20px rgba(179, 57, 244, 0.5); border-color: #d178ff; }
        .card-1y h3 { background: linear-gradient(90deg, #d178ff, #b339f4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card-1y .btn-select { background: #b339f4; }
        .card-1y .btn-select:hover { background: #c653ff; }
        /* Футер */
        footer { background: rgba(10, 8, 6, 0.98); padding: 30px 15px; border-top: 1px solid rgba(255, 255, 255, 0.05); font-size: 11px; color: var(--text-secondary); text-align: center; width: 100%; margin-top: auto; }
        .footer-links { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-bottom: 15px; }
        .footer-links a { color: var(--accent-gold); text-decoration: none; font-weight: bold; padding: 5px; cursor: pointer; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; padding: 10px; overflow-y: auto; backdrop-filter: blur(10px); }
        .modal-content { background: var(--card-bg); padding: 25px; border-radius: 24px; max-width: 600px; width: 100%; margin: 10px auto; border: 1px solid rgba(255, 255, 255, 0.1); }
        .close-modal { float: right; color: var(--accent-color); font-size: 30px; cursor: pointer; line-height: 1; }
        .modal-body { font-size: 13px; color: var(--text-secondary); line-height: 1.6; text-align: left; }
        .modal-body h3 { color: var(--accent-gold); margin-top: 0; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .modal-body p { margin-bottom: 15px; }

        @media (max-width: 320px) { .cards-container { grid-template-columns: 1fr; } .tariff-card { padding: 25px 15px; } }
    </style>

    </body>
    </html>
